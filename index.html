<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토익 스피킹 만능문장 퀴즈</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="header">
        <div class="header-top">
          <div class="header-text">
            <h1>토익 스피킹 만능문장 퀴즈</h1>
            <p>
              한글 뜻을 보고 영어 문장을 직접 입력해 보세요.
              대소문자, 스마트 따옴표, 문장부호, 여분 공백 차이는 자동으로 보정합니다.
            </p>
          </div>
          <div class="part-tabs">
            <button class="part-tab active" id="part3Btn">Part 3</button>
            <button class="part-tab" id="part5Btn">Part 5</button>
          </div>
        </div>
      </header>
      <main class="body">
        <section class="topbar">
          <div class="pill-group">
            <div class="pill" id="progressPill">현재 1번</div>
            <div class="pill" id="scorePill">정답 0 · 오답 0</div>
            <div class="pill" id="accuracyPill">정확도 0%</div>
          </div>
          <div class="pill-group">
            <button class="secondary" id="resetStatsBtn">기록 초기화</button>
          </div>
        </section>

        <section class="settings">
          <div class="setting-card">
            <label for="mode">문제 출제 방식</label>
            <select id="mode">
              <option value="random">랜덤 출제</option>
              <option value="sequential">순차 출제</option>
            </select>
          </div>

          <div class="setting-card">
            <label for="countFilter">출제 범위</label>
            <select id="countFilter">
            </select>
          </div>

          <div class="setting-card">
            <label>옵션</label>
            <label class="inline option-row">
              <input type="checkbox" id="showCategory" checked>
              카테고리 보기
            </label>
            <label class="inline option-row">
              <input type="checkbox" id="autoNext">
              정답 시 자동 다음 문제
            </label>
          </div>
        </section>

        <section class="card question-card">
          <div class="label">현재 문제</div>
          <div class="question-title" id="questionTitle">1. 스트레스</div>
          <div class="meaning" id="meaning"></div>
          <div class="hint" id="hint"></div>
        </section>

        <section class="card answer-card">
          <div class="label">영어 문장 입력</div>
          <textarea id="answerInput" placeholder="영어 문장을 입력하세요 (Enter = 채점 / Shift+Enter = 줄바꿈)"></textarea>

          <div class="buttons">
            <button class="primary" id="checkBtn">채점하기</button>
            <button class="secondary" id="showAnswerBtn">정답 보기</button>
            <button class="nav-btn" id="prevBtn">이전 문제</button>
            <button class="success" id="nextBtn">다음 문제</button>
          </div>

          <div class="result" id="resultBox">
            <div class="result-title" id="resultTitle"></div>
            <div id="resultBody"></div>
          </div>

          <div class="footer-note">
             (Enter = 채점 / Shift+Enter = 줄바꿈)
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
